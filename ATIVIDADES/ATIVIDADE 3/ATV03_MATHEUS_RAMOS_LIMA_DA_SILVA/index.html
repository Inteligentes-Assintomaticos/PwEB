<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Interativa</title>
    <link rel="icon" type="image/x-icon" href="img/image.png">
</head>

<style>

    /* Meche na tabela, célula de cabeçalho e célula de conteúdo. */
    table, th, td {
        border: 1px solid; /* Adiciona bordas de 1 pixel no estilo solido */
        border-color: rgb(56, 56, 56); /* Adiciona a cor na borda */
        border-collapse: collapse; /* Compartilha a borda, ou seja, não tem bordas duplas */
    }

    /* Meche em toda tag de tabela aberta */
    table {
        min-width: 70%; /* Define a largura mínima da tabela */
        max-width: 71%; /* Define a largura máxima da tabela */
    }

    /* Meche nas células de conteúdo */
    td {
        text-align: center; /* Alinha o texto no centro da célula */
        color: rgb(0, 0, 0); /* Define a cor do texto */
    }

    /* Meche nas células de cabeçalho e conteúdo */
    th, td {
        font-family: 'Segoe UI', Tahoma,  Geneva, Verdana, sans-serif; /* Define a família da fonte */
    }

    /* Meche nas células de cabeçalho */
    th {
        font-size: 14pt; /* Define o tamanho da fonte */
        color: white; /* Define a cor do texto */
        background-color:  rgb(46, 45, 56); /* Define a cor de fundo do cabeçalho */
    }

</style>


<body>

    <!-- Tabela Principal -->
    <table style="height: 98vh; margin-left: 15%; margin-right: 15%;">

        <!-- Cabeçalho -->
        <tr>
            <th colspan="2" style="padding-top: 3%; padding-bottom: 3%;">
                Página Interativa
            </th>
        </tr>

        <!-- Conteúdo de Navegação Lateral -->
        <tr>
            <td style="width: 15%; vertical-align: top; padding-top: 2%;background-color: rgb(255, 255, 255);">
                
                <a href="curriculo.html" target="iframe" style="text-decoration: none; color: rgb(41, 40, 40); font-weight: bold; margin-bottom: 5%;" title="linkagemcomcurriculo">Currículo-Matheus</a>

                <br>
                <br>

                <a href="aliceinchains.html" target="iframe" style="text-decoration: none; color: rgb(41, 40, 40); font-weight: bold;" title="linkagemcomcurriculo">Alice in Chains</a>

            </td>

            <!-- Conteúdo Principal -->
            <td style="padding: 0; vertical-align: top; border-spacing: 0; height: 50vh;">

                <iframe src="curriculo.html" name="iframe" style="border: none; width: 100%; height: 72vh; margin: 0; overflow-y: scroll; " title="Conteúdo" ></iframe>

            </td>

        </tr>

        <tr>

            <!-- Rodapé -->
            <td colspan="2" style="background-color: rgb(46, 45, 56);" >

                <p style="color: white; font-size: 12pt;">Contatos: mrls9@aluno.ifal.edu.br | @rwvthrdev</p>
                <a href="https://github.com/rwvthrdev" style="color: white; text-decoration: none; font-weight: bold;" target="_blank" title="githubmeu">GitHub</a>

            </td>

        </tr>

    </table>
    
</body>

</html>
