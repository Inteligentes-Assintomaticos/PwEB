<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Interativa</title>
    <link rel="icon" type="image/x-icon" href="img/image.png">
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

    body {
        display: grid; /* Aplica o formato grid para o corpo */
        grid-template-columns: 25% 1fr; /* 25% para a barra lateral e 1 fração para a parte do conteúdo (iframe)*/
        grid-template-rows: auto 1fr auto; /* Auto para o cabeçalho e rodapé, e 1 fração para a lateral e para a parte do conteúdo (iframe) */
        gap: 5px; /* Espaço entre os elementos */
        height: 100vh; /* Ocupa 100% da altura da tela */
        margin-top: 1%; /* 1% da tela para margem de cima */
        margin-bottom: 1%; /* 1% da tela para margem de baixo */
        margin-left: 10%; /* 10% da tela para margem da esquerda */
        margin-right: 10%; /* 10% da tela para margem da direita */

        background-color: rgb(126, 126, 126); /* Adiciona cor ao fundo */
    }

    /* Id */
    /* Cabeçalho */
    #cabecalho {
        grid-column: 1 / span 2; /* Faz o cabeçalho ocupar as duas colunas do grid */
        background-color: #000000; /* Adiciona cor ao fundo */
        text-align: center; /* Alinha o texto ao centro */
        padding: 20px; /* Adiciona espaçamento interno */
        color: #ffffff; /* Adiciona cor ao texto */

        font-family: 'Inter', sans-serif; /* Adiciona estilo da fonte. Obs: Importada do Google Fonts */
    }

    /* Id */
    /* Lado */
    #ladinho {
        background-color: #2e2e2e; /* Adiciona cor ao fundo */
        text-align: center; /* Alinha o texto ao centro */
        color: #ffffff; /* Adiciona cor ao texto */
        padding-top: 20px; /* Adiciona espaçamento interno no topo */
    }

    /* Id */
    /* Conteúdo principal */
    #meio {
        background-color: #000000; /* Adiciona cor ao fundo */
        padding: 2%; /* Adiciona espaçamento interno */
    }

    /* Id */
    /* Rodapé */
    #rodape {
        grid-column: 1 / span 2; /* Faz o rodapé ocupar as duas colunas do grid */
        background-color: #000000;  /* Adiciona cor ao fundo */
        text-align: center; /* Alinha o texto ao centro */
        padding: 20px; /* Adiciona espaçamento interno */
        font-family: 'Inter', sans-serif; /* Adiciona estilo da fonte. Obs: Importada do Google Fonts */
        color: #ffffff; /* Adiciona cor ao texto */
    }

    /* Classe */
    /* Texto da lateral */
    .textolado {
        color: #ffffff; /* Adiciona cor ao texto */
        text-decoration: none; /* Remove o sublinhado dos links */
        font-size: 12pt; /* Tamanho da fonte */
        font-family: 'Inter', sans-serif; /* Adiciona estilo da fonte. Obs: Importada do Google Fonts */
    }
    
    /* Classe */
    /* Elemento da lista */
    .element {
        margin-bottom: 5px; /* Adiciona espaço na margem inferior*/
        padding: 10px; /* Adiciona espaçamento interno */
    }

    
    /* Classe */
    /* Lista */
    .list {
        list-style-type: none; /* Remove os marcadores da lista */
        padding: 0; /* Remove o preenchimento da lista */
    }
    
</style>


<body>

    <div id="cabecalho">
        <h1>Hub Interativo</h1>
    </div>

    <div id="ladinho">
        <ul class="list">
            <li class="element"><a href="curriculo.html" target="iframe" class="textolado" title="linkagemcomcurriculo">Currículo-Matheus</a></li>
            <li><a href="aliceinchains.html" target="iframe" class="textolado" title="linkagemcomcurriculo">Alice in Chains</a></li>
        </ul>
    </div>

    <div id="meio">
        <iframe src="curriculo.html" name="iframe" style="border: none; width: 100%; height: 72vh; margin: 0; overflow-y: scroll; " title="Conteúdo" ></iframe>
    </div>

    <div id="rodape">
        <p style="color: white; font-size: 12pt;">Contatos: mrls9@aluno.ifal.edu.br | @rwvthrdev</p>
        <a href="https://github.com/rwvthrdev" style="color: white; text-decoration: none; font-weight: bold;" target="_blank" title="githubmeu">GitHub</a>
    </div>
    

</body>

</html>
