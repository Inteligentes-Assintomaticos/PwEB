<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="shortcut icon" href="./img/foto-curriculo.png" type="image/x-icon">

    <title>Tabela</title>

<style>

    body, html {
        height: 95%;    /* Altura da página */
        margin: 0;      /* Margens da página */

        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;   /* Fonte do texto */
    }


    table {
        
        margin: auto;       /* Ajuste automático das margens ➡ pra centralizar */
        margin-top: 30px;   /* Margem superior ➡ pra dar um espaço*/
        margin-bottom: 0px; /* Margem inferiro ➡ pra remover a margem inferior */

        height: 95vh;   /* vh = definir altura de acordo com o tamanho da tela */

        border-right: 1.5px solid black;    /* borda direita da tabela */

    }

    

    tr {
        text-align: center;         /* Alinhar o texto horizontalmente no meio */
        vertical-align: middle;     /* Alinhar o texto verticamentel no meio */
    }
    

</style>

<body>

    <!-- Felipe Gabriel Araújo de Freitas - 523 -->


    
    
    <table width="75%" border="0" style="border-collapse: collapse;">
        
        

        <!-- TÍTULO -->
        <tr style="height: 100px;   /* altura */
        font-size: 20pt;
        background-color: blue; /* cor do fundo */
        color: white;   /* cor do texto */
        ">

        </tr>

        <tr style="background-color: #0000CD; color: white;">

            font-size: 18pt;    /* Tamanho da fonte */
            vertical-align: top;
            padding-top: 40px;;">

                <iframe src="curriculo.htm" frameborder="0" width="100%" height="100%" name="iframe"></iframe>
