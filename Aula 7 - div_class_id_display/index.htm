<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela com div</title>
    
    
<style>
    * {
        /* border: 1px solid red; */
        margin: 0;
    }
    


    #tabela {
        margin: 30px auto 0;    /* Margens da tabela */
        
        width: 80%;     /* Largura */
        height: 70vh;   /* Altura */
    }




    #cabecalho{
        display: flex;  /* Tipo de display */
        justify-content: center;    /* Centraliza horizontalmente*/
        align-items: center;    /* Centraliza verticalmente */
        
        height: 100px;  /* Altura */
        
        background-color: greenyellow; /* Cor de fundo */
    }





    .grid {
        display: grid;  /* Tipo de display */
        grid-template-columns: 0.3fr 2fr;   /* Divisão das colunas ➡️ para criar o menu lateral e deixar o espaço para o conteúdo */

        grid-template-rows: 80vh;   /* Altura desse bloco*/
    }
    




    #menu-lateral {

        
        background-color: antiquewhite; /* Cor de fundo */

    }





    #conteudo {
        background-color: brown;    /* Cor de fundo */

    }




    #rodape {
        display: flex;  /* Tipo de display */
        justify-content: center;    /* Centraliza horizontalmente*/
        align-items: center;    /* Centraliza verticalmente */
        
        height: 50px;  /* Altura */
        
        background-color: blueviolet; /* Cor de fundo *//

    }
        

        
    </style>

</head>
<body>

<div id="tabela">


    <!-- CABEÇALHO -->
    <div id="cabecalho">
        <h1>CABEÇALHO</h1>
    </div>



    <div class="grid">

        <!-- MENU LATERAL -->
        <div id="menu-lateral">MENU LATERAL</div>
        


        <!-- CONTEÚDO -->
        <div id="conteudo">
            CONTEÚDO
        </div>

    </div>



    <!-- RODAPÉ -->
    <div id="rodape">
        <h1>RODAPÉ</h1>
    </div>

</div>
    
</body>
</html>
