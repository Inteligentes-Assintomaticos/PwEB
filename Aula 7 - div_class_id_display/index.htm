<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela com div</title>
    
    
<style>
    * {
        /* border: 1px solid red; */
        margin: 0;
    }
    

    #tabela {
        margin: 30px auto 0;
        
        width: 80%;
        height: 70vh;
    }

    #cabecalho{
        background-color: greenyellow;

        width: 100%;
        height: 100px;

        text-align: center;
        vertical-align: middle;
    }


    .grid {
        display: grid;
        grid-template-columns: 10% 100%;
    }
    
    #menu-lateral {
        background-color: antiquewhite;

        width: 10%;
        min-width: 100px;
        height: 100%;
    }

    #conteudo {
        
        
        background-color: brown;

        width: 100%;
        height: 100%;

        text-align: center;
    }

    #rodape {
        background-color: blueviolet;

        width: 100%;
        height: 100px;

        text-align: center;

    }
        

        
    </style>

</head>
<body>

    <div id="tabela">


        <!-- Cabeçalho -->
        <div id="cabecalho">

            <h1>CABEÇALHO</h1>
            
        </div>



        <div id="menu-lateral" class="grid"></div>
        
        <!-- Conteúdo -->
        <div id="conteudo" class="grid">

        </div>
        



        <!-- Rodapé -->
        <div id="rodape">
            <h1>RODAPÉ</h1>
        </div>

    </div>
    
</body>
</html>
