<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela com div</title>
    
    
<style>
    * {
        /* border: 1px solid red; */
        margin: 0;
    }
    


    #tabela {
        margin: 30px auto 0;    /* Margens da tabela */
        
        width: 80%;     /* Largura */
        height: 70vh;   /* Altura */
    }




    #cabecalho{
        display: flex;  /* Tipo de display */
        justify-content: center;    /* Centraliza horizontalmente*/
        align-items: center;    /* Centraliza verticalmente */
        
        height: 100px;  /* Altura */
        
        background-color: #242323; /* Cor de fundo */
        color: white;
    }





    .grid {
        display: grid;  /* Tipo de display */
        grid-template-columns: 0.3fr 2fr;   /* Divisão das colunas ➡️ para criar o menu lateral e deixar o espaço para o conteúdo */

        grid-template-rows: 80vh;   /* Altura desse bloco*/
    }
    




    #menu-lateral {
        display: flex;  /* Tipo de display */
        flex-direction: column; /* Direção dos elementos ➡️ um abaixo do outro */
        justify-content: left;  /* Alinha a esquerda */

        
        background-color: #363434; /* Cor de fundo */
        color: white;

        padding-left: 10px; /* Espaço interno a esquerda */
        padding-top: 10px;  /* Espaço interno emcima*/
    }

    #menu-lateral h1 {
        align-self: flex-start; /* Para o elemento ocupar apenas o seu espaço */
        width: 90%;   /* Para ocupar a linha toda */ 
        
        font-size: 15pt;    /* Tamanho do texto */

        border-bottom: 1px solid white; /* Boda embaixo do texto */

        padding-bottom: 10px;   /* Espaço interno embaixo*/

    }

    #menu-lateral h2 {
        font-size: 17pt;    /* Tamanho da fonte */

        padding-left: 30px; /* Espaço interno a esquerda */

    }

    #menu-lateral a {
        text-decoration: none;  /* Pare remover o underline do link */
        color: white;       /* Cor do texto */
    }





    #conteudo {
        background-color: #292828;  /* Cor de fundo*/
        color: white;   /* Cor do texto */
    }




    #rodape {
        display: flex;  /* Tipo de display */
        justify-content: center;    /* Centraliza horizontalmente*/
        align-items: center;    /* Centraliza verticalmente */
        
        height: 50px;  /* Altura */
        
        background-color: #242323; /* Cor de fundo */

        color: white;   /* Cor do texto */
    }
        

        
    </style>

</head>
<body>

<div id="tabela">


    <!-- CABEÇALHO -->
    <div id="cabecalho">
        <h1>FELIPE GABRIEL ARAÚJO DE FREITAS</h1>
    </div>



    <div class="grid">

        <!-- MENU LATERAL -->
        <div id="menu-lateral">

            <h1>PÁGINAS</h1>
            <br>
            <h2><a href="./curriculo.htm" target="iframe">Currículo</a></h2>
            <h2><a href="./tema_livre.htm" target="iframe">Player Tauz</a></h2>

        </div>
        


        <!-- CONTEÚDO -->
        <div id="conteudo">

            <iframe name="iframe" title="Páginas" src="./curriculo.htm" frameborder="0" width="100%" height="100%"></iframe>
            
        </div>

    </div>



    <!-- RODAPÉ -->
    <div id="rodape">
        <h1>2026</h1>
    </div>

</div>
    
</body>
</html>
