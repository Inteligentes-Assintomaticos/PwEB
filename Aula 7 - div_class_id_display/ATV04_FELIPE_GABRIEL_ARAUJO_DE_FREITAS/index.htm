<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./img/layout.ico" type="image/x-icon">
    
    <title>Layout</title>
    
    
<style>

    
    html, body {
        height: auto;   /* Altura */
        margin: 0;      /* Margens zerada*/
        padding: 0;     /* Espaço interno zerado*/
        color: white; /* Cor do texto*/
    }


    /* ===LAYOUT=== */

    #layout {                   /* Para*/        
        display: flex;          /* Tipo de display*/
        flex-direction: column; /* Direção dos elementos ➡️ em coluna (um abaixo do outro)*/
        
        margin: 30px auto;      /* Margens da tabela ➡ 30px top e bottom e auto para right e left*/
        
        width: 95%;     /* Largura */
        height: 100%;   /* Altura */
    }

    /* ===LAYOU DE CABEÇALHO E RODAPÉ=== */

    .layout {                             /* Cor e altura do cabeçalho e do rodapé*/
        display: flex;              /* Tipo de display*/
        justify-content: center;    /* Centraliza horizontalmente*/
        align-items: center;        /* Centraliza verticalmente */

        background-color: #100E09;      /* Cor de fundo*/
        height: 100px;                    /* Altura*/
    }

    #cabecalho {    /* Cabeçalho*/
        /*Atualmente sem uso*/
    }

    #rodape {   /* Rodapé*/
        /* Atualmente sem uso*/
    }


    /* ===LAYOUT DE MENU E CONTEÚDO=== */

    .grid {             /* Latout do menu e conteúdo*/
        display: grid;  /* Tipo de display */
        grid-template-columns: 0.3fr 2fr;   /* Divisão das colunas ➡️ para criar o menu lateral e deixar o espaço para o conteúdo */

        grid-template-rows: 80vh;   /* Altura desse bloco*/
    }
    



    /* ===MENU LATERAL=== */

    #menu-lateral {     /* Menu lateral*/
        display: flex;  /* Tipo de display*/
        flex-direction: column; /* Direção dos elementos ➡️ um abaixo do outro*/
        justify-content: left;  /* Alinha a esquerda*/

        
        background-color: #292828;  /* Cor de fundo*/

        padding-left: 10px; /* Espaço interno a esquerda*/
        padding-top: 10px;  /* Espaço interno emcima*/
    }

    #menu-lateral h1 {          /* Título*/
        align-self: flex-start; /* Para o elemento ocupar apenas o seu espaço*/
        width: 90%;             /* Para não ocupar a linha toda*/ 
        
        font-size: 15pt;        /* Tamanho do texto*/

        border-bottom: 1px solid white; /* Boda embaixo do texto*/

        padding-bottom: 10px;   /* Espaço interno embaixo*/

        margin-top: 40px;       /* Para dar um espaço no topo*/
    }

    #menu-lateral h2 {      /* Subtítulo*/
        font-size: 17pt;    /* Tamanho da fonte*/
        padding-left: 30px; /* Espaço interno a esquerda*/

        margin-bottom: 10px;    /* Para dar um espaço entre os links*/
    }

    #menu-lateral a {           /* Links do menu lateral*/
        text-decoration: none;  /* Pare remover o underline do link*/
        color: white;        /* Cor do texto*/
    }


    /* ===CONTEÚDO=== */

    #conteudo {
        background-color: #1c1c1c;  /* Cor de fundo*/
    }

        
</style>

</head>
<body>

<div id="layout">


    <!-- CABEÇALHO -->
    <div id="cabecalho" class="layout">
        <h1>FELIPE GABRIEL ARAÚJO DE FREITAS</h1>
    </div>



    <div class="grid">

        <!-- MENU LATERAL -->
        <div id="menu-lateral">

            <h1>PÁGINAS</h1>
            <br>
            <h2><a href="./curriculo.htm" target="iframe">Currículo</a></h2>
            <h2><a href="./tema_livre.htm" target="iframe">Player Tauz</a></h2>

        </div>
        


        <!-- CONTEÚDO -->
        <div id="conteudo">

            <iframe name="iframe" title="Páginas" src="./curriculo.htm" frameborder="0" width="100%" height="100%"></iframe>
            
        </div>

    </div>


    <!-- RODAPÉ -->
    <div id="rodape" class="layout">
        <h1>2026</h1>
    </div>

</div>
    
</body>
</html>
