<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 4 - Tabelas</title>
</head>
<body>
    <h1>Tabelas</h1>

    
    <table width="100%" border="1"> <!-- Atributos próprio da tabela -->
        <tr>                <!-- tr = linha -->
            <th>Nome</th>   <!-- th = coluna -->
            <th>Idade</th>
            <th>Peso</th>
        </tr>

        <tr>
            <th>Felipe</th>
            <th>17</th>
            <th>50Kg</th>
        </tr>
    </table>
    
</body>
</html>
