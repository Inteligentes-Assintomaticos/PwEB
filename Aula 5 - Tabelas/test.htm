<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 5 - Tabelas</title>
</head>

<style>

    body, html {
        height: 95%;
        margin: 0;
        padding: 0;

        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }


    table {
        
        margin: auto;
        margin-left: auto;
        margin-right: auto;
        margin-top: 30px;
        margin-bottom: 0px;

        height: 95vh;   /* vh = definir altura de acordo com o tamanho da tela */

    }

    h2 {
        font-size: ;
    }
    
    p {
        font-size: 15pt;
        text-align: justify;
        padding: 15px;
    }
    

</style>

<body>
    
    <table width="75%" border="1" style="border-collapse: collapse;">
        
        <!-- TÍTULO -->
        <tr style="height: 100px; font-size: 20pt;">

            <th colspan="2">Player Tauz: O Revolucionário dos anos 2000</th>

        </tr>

        <!-- CONTEÚDO -->
        <tr style="vertical-align: top;">
            <td width="10%"></td>
            <td>ds</td>
            <td>da</td>
        </tr>

        <!-- RODAPÉ -->
         <tr id="rodape" style="height: 50px; font-size: 20pt;">

            <th colspan="2">rodapé</th>

         </tr>
    </table>
    
</body>
</html>
