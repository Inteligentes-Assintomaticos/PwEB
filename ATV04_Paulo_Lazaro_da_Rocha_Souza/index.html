<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página Principal - ATV04</title>
    <!-- Favicon da página -->
    <link rel="icon" type="image/x-icon" href="img/tiringa.ico">

<style>
    /* CSS Interno para o Layout Mestre usando Divs, IDs e Classes */

    /* Estilos globais */
    body, html {
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        overflow: hidden; /* Evita rolagem na página principal */
    }



    /* TOPO E RODAPÉ */

    .topo-e-rodape {
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        background-color: #111111;
        height: 100px;
    }
    
    
    /* ID para o cabeçalho (Topo) */
    #topo-site {

    }

    /* ID para o rodapé */
    #rodape-site {

    }


    /* MENU LATERAL */


    #menu-lateral-e-conteudo {
        display: grid;
        grid-template-columns: 200px auto;

        grid-template-rows: 80vh;   /* Altura desse bloco*/
    }

    /* ID para o menu lateral */
    #menu-lateral {
        background-color: #ff7300;
        padding: 20px;
    }

    
    /* ID para o container do conteúdo principal */
    #conteudo-principal {
        background-color: #f0f0f0;
    }


    /* 2. Classes para elementos reutilizáveis */

    /* Classe para os links de navegação */
    .link-navegacao {
        color: white;
        text-decoration: none;
        display: block;
        margin-bottom: 15px;
        font-weight: bold;
        padding: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.3);
    }


    /* ID para o link externo diferenciado */
    #link-externo-destaque {
        color: #111111;
        font-size: 12px;
        text-decoration: underline;
        margin-top: 30px;
        display: block;
    }



    /* Ajustando Iframe */
    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }


</style>

</head>
<body>

    <!-- Cabeçalho usando ID e Classe -->
    <div id="topo-site" class="topo-e-rodape">
        <h1>Portal do Paulo Lázaro - ATV04</h1>
    </div>


    <div id="menu-lateral-e-conteudo">

        <!-- Menu Lateral usando ID -->
        <div id="menu-lateral">
            <h2 style="color: white; margin-top: 0;">Menu</h2>
            
            <!-- Links usando Classes -->
            <a href="curriculo.html" target="janela_iframe" class="link-navegacao">Meu Currículo</a>
            <a href="tema.html" target="janela_iframe" class="link-navegacao">Tema Livre (DBZ)</a>
            
            <!-- Link Externo -->
            <a href="https://www.google.com" target="_blank" id="link-externo-destaque">Pesquisar no Google</a>
            
        </div>

        <!-- Área de Conteúdo usando ID -->
        <div id="conteudo-principal">
            <!-- Iframe envelopado em uma div conforme instrução -->
            <iframe 
                src="curriculo.html" 
                name="janela_iframe" 
                title="Área de exibição das páginas internas"
                width="100%" 
                height="100%">
            </iframe>

        </div>

    </div>
    <!-- Rodapé usando ID -->
    <div id="rodape-site" class="topo-e-rodape">
        <p>&copy; 2026 - Paulo Lázaro da Rocha Souza - Turma 523 - ATV04</p>
    </div>

</body>
</html>
