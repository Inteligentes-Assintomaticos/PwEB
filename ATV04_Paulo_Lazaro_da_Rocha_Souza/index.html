<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página Principal - ATV04</title>
    <!-- Favicon da página -->
    <link rel="icon" type="image/x-icon" href="img/tiringa.ico">

<style>

    /* Estilos globais */
    body, html {
        margin: 0;  /* Para zerar as margens */
        font-family: Arial, sans-serif; /* Fonte */
    }

    /* Tabela */
    #pagina {
        margin: 30px auto;  /* margens */
        width: 95%;         /* largura */
    }


    /* TOPO E RODAPÉ */

    .topo-e-rodape {
        text-align: center; /* Centraliza texto */
        display: flex;      /* Tipo de display*/
        align-items: center;    /* Centralizar */
        justify-content: center;    /* Centralizar */
        color: white;   /* Cor do texto*/
        background-color: #111111;  /* cor de fundo*/
        height: 100px;  /* altura */
    }
    
    
    /* ID para o cabeçalho (Topo) */
    #topo-site {
        /* não utilizado*/
    }

    /* ID para o rodapé */
    #rodape-site {
        /* não utlizado */
    }


    /* MENU LATERAL */


    #menu-lateral-e-conteudo {
        display: grid;      /* display */
        grid-template-columns: 200px auto;  /* Largura de 200px pro menu e restante pro conteúdo */

        grid-template-rows: 80vh;   /* Altura do bloco */
    }

    /* ID para o menu lateral */
    #menu-lateral {
        background-color: #ff7300;  /* cor de fundo */
        padding: 20px;  /* espaço interno */
        color: white;   /* cor do texto */
    }

    
    /* ID para o container do conteúdo principal */
    #conteudo-principal {
        background-color: #f0f0f0;  /* cor de fundo */
    }


    /* 2. Classes para elementos reutilizáveis */

    /* Classe para os links de navegação */
    .link-navegacao {
        color: white;   /* cor do texto */
        text-decoration: none;  /* tirar underline */
        display: block; /* display*/
        margin-bottom: 15px;    /* margem de baixo */
        font-weight: bold;  /* pra deixar em negrito */
        padding: 10px;  /* espaço interno */
        border-bottom: 1px solid rgba(255,255,255,0.3); /* borda em baixo com rgba (para configurar opacidade) */
    }


    /* ID para o link externo diferenciado */
    #link-externo-destaque {
        color: #111111; /* cor do texto */
        font-size: 12px;    /* tamanho do texto */
        text-decoration: underline; /* para colocar underline */
        margin-top: 30px;   /* margem superior */
        display: block; /* display */
    }



    /* Ajustando Iframe */
    iframe {
        width: 100%;    /* largura */
        height: 100%;   /* altura */
        border: none;   /* sem borda */
    }


</style>

</head>
<body>

<!-- Página toda -->
<div id="pagina">

    <!-- Cabeçalho usando ID e Classe -->
    <div id="topo-site" class="topo-e-rodape">
        <h1>Portal do Paulo Lázaro - ATV04</h1>
    </div>


    <div id="menu-lateral-e-conteudo">

        <!-- Menu Lateral usando ID -->
        <div id="menu-lateral">
            <h2 style="margin-top: 0;   /* para zerar a margem de cima*/
            ">Menu</h2>
            
            <!-- Links usando Classes -->
            <a href="curriculo.html" target="janela_iframe" class="link-navegacao">Meu Currículo</a>
            <a href="tema.html" target="janela_iframe" class="link-navegacao">Tema Livre (DBZ)</a>
            
            <!-- Link Externo -->
            <a href="https://www.google.com" target="_blank" id="link-externo-destaque">Pesquisar no Google</a>
            
        </div>

        <!-- Área de Conteúdo usando ID -->
        <div id="conteudo-principal">
            <!-- Iframe envelopado em uma div conforme instrução -->
            <iframe 
                src="curriculo.html"
                name="janela_iframe" 
                title="Área de exibição das páginas internas"
                width="100%" 
                height="100%">
            </iframe>

        </div>

    </div>
    <!-- Rodapé usando ID -->
    <div id="rodape-site" class="topo-e-rodape">
        <p>&copy; 2026 - Paulo Lázaro da Rocha Souza - Turma 523 - ATV04</p>
    </div>

</div>

</body>
</html>
